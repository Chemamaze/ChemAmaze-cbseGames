<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChemAmaze Bilingual Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<script src="script.js"></script>
<body class="theme-home">

    <div id="app-container-wrapper" class="app-container home-active">
        
        <div class="top-bar">
            <img src="logo.jpeg" class="top-logo" alt="ChemAmaze Logo">
        </div>

        <div id="navigation-bar" class="nav-bar">
            <button id="btn-back" class="nav-btn" onclick="goBack()">← Back</button>
            <button id="btn-main" class="nav-btn" onclick="goMain()">🏠 Main Page</button>
        </div>

        <div id="screen-home" class="screen active">
            <h1 id="txt-app-title">ChemAmaze - CBSE Board Syllabus Games</h1>
            <a href="#" id="txt-enter-btn" class="enter-link" onclick="navigateTo('subjects')">Click here to enter</a>
            <div class="csr-footer">

                <div class="csr-text-box">A CSR INITIATIVE OF</div>
                <img src="d-basf.png" class="csr-logo" alt="BASF Logo">
                <div class="csr-text-box">PARTNERS IITM, PKC</div>
        </div>
        </div>

        <div id="screen-subjects" class="screen">
            <h2 id="txt-select-subject">Select Subject</h2>
            <div class="list-container">
                <a href="#" class="item-link" onclick="selectSubject('Mathematics')">
                    <span class="lang-show en-inline">Mathematics</span>
                </a>
                <a href="#" class="item-link" onclick="selectSubject('Science')">
                    <span class="lang-show en-inline">Science</span>
                </a>
                <a href="https://docs.google.com/forms/d/e/1FAIpQLSdCqEmH8_4z42RrWMT1x5IdJRUpFFElWM_I8kEMBpEvNoBq5g/viewform?usp=publish-editor"
                    target="_blank"
                    class="item-link feedback-link">
                    📝 Game Feedback Form
                    </a>
            </div>
        </div>

        <div id="screen-grades" class="screen">
            <h2 id="grade-screen-title">Select Class</h2>
            <div class="list-container">
                <a href="#" class="item-link" onclick="loadGames(6)"><span class="txt-class-prefix">Class</span> 6</a>
                <a href="#" class="item-link" onclick="loadGames(7)"><span class="txt-class-prefix">Class</span> 7</a>
                <a href="#" class="item-link" onclick="loadGames(8)"><span class="txt-class-prefix">Class</span> 8</a>
            </div>
        </div>

        <div id="screen-games" class="screen">
            <h2 id="selected-class-title">Games List</h2>
            <div id="games-list-container" class="list-container">
            </div>
        </div>
        <div id="screen-player" class="screen">
    <h2 id="player-title">Game</h2>

    <div id="game-player-container" style="width:100%;">
    </div>
</div>
<div id="screen-additional-games" class="screen">
    <h2>Additional Games</h2>

    <div id="additional-games-container"
         class="list-container">
    </div>
</div>

</div>
    </div>

</body>
</html>
